<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="./assets/img/favicon.ico" />
    <link rel="stylesheet" href="./assets/css/contacto.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link href="https://fonts.cdnfonts.com/css/josefin-sans" rel="stylesheet">
    <script src="https://kit.fontawesome.com/eb496ab1a0.js" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <title>Contacto - Vianda Market</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.4/font/bootstrap-icons.css">
</head>

<body>
    <!-- Inicio de header -->
    <header>
        <div class="headerQuick">
        </div>
    </header>
    <!-- Fin de header -->
    <div class="title">
        <h1>CONTACTO</h1>
    </div>
    <main class="container-fluid bg-azuloscuro py-5">
        <div class="row align-items-stretch justify-content-center m-0">

            <!-- Columna Izquierda: Mapa -->
            <div
                class="col-md-6 d-flex justify-content-center justify-content-md-end align-items-stretch mb-5 mb-lg-0 pe-custom">
                <div
                    class="mapa-container w-100 d-flex justify-content-center justify-content-md-end align-items-stretch">
                    <iframe class="mapa shadow rounded-4 mapa-contacto" border="0"
                        src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d485.4875475475178!2d-106.4535459051831!3d23.246224487120433!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1sAv.%20Camar%C3%B3n%20Sabalo%201500%2C%20Col.%20Gaviotas%3B%20frente%20a%20Camino%20al%20Mar.!5e0!3m2!1ses!2smx!4v1681157624973!5m2!1ses!2smx"
                        allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>
            </div>

            <!-- Columna Derecha: Información y Formulario -->
            <div class="col-md-6 d-flex flex-column align-items-center align-items-md-start ps-custom">

                <div class="d-flex flex-column align-items-center align-items-md-start">
                    <div class="info-contacto mb-3">
                        <div class="icono izquierda-centro">
                            <img class="img-icon" src="./assets/icon/whatsapp-rojo.svg" alt="">
                        </div>
                        <div class="info izquierda-centro">
                            ¡Mándanos un Whatsapp!
                            <br> 744 123 4678
                        </div>
                    </div>

                    <div class="info-contacto mb-3">
                        <div class="icono izquierda-centro">
                            <img class="img-icon" src="./assets/icon/clock-rojo.svg" alt="">
                        </div>
                        <div class="info izquierda-centro">
                            Lunes - Miércoles 10:00am - 6:00pm
                            <br> Jueves - Sábado 10:00am - 8:00pm
                            <br> Domingo 10:00am - 2:00pm
                        </div>
                    </div>

                    <div class="info-contacto mb-3">
                        <div class="icono izquierda-centro">
                            <img class="img-icon" src="./assets/icon/email-solid.svg" alt="">
                        </div>
                        <div class="info izquierda-centro">
                            info@viandamarket.com
                        </div>
                    </div>

                    <div class="info-contacto linea-baja mb-4">
                        <div class="icono izquierda-centro">
                            <img class="img-icon" src="./assets/icon/location-dot-rojo.svg" alt="">
                        </div>
                        <div class="info izquierda-centro">
                            Av. Camarón Salado 1678, Col. Anclas; frente a Camino al Mar.
                        </div>
                    </div>
                </div>

                <div class="formulario w-100 d-flex justify-content-center justify-content-md-start">
                    <form action="" method="post"
                        class="w-100 d-flex flex-column align-items-center align-items-md-start">
                        <div class="conjunto-inputs d-flex flex-column align-items-center align-items-md-start w-100">
                            <div class="mb-3 input-box-VM w-100 text-center">
                                <label for="name" class="d-none">Nombre</label>
                                <input type="text" class="form-control contact inputs-VM mx-auto ms-md-0" id="name"
                                    placeholder="Nombre">
                            </div>
                            <div class="mb-3 input-box-VM w-100 text-center">
                                <label for="email" class="d-none">Correo</label>
                                <input type="email" class="form-control contact inputs-VM mx-auto ms-md-0" id="email"
                                    placeholder="Correo Electrónico">
                            </div>
                            <div class="mb-3 input-box-VM w-100 text-center">
                                <label for="phone" class="d-none">Teléfono</label>
                                <input type="text" class="form-control contact inputs-VM mx-auto ms-md-0" id="phone"
                                    placeholder="Teléfono">
                            </div>
                            <div class="mb-4 input-box-VM w-100 text-center">
                                <label for="msj" class="d-none">Mensaje</label>
                                <textarea class="contact text-VM form-control mx-auto ms-md-0" id="msj" rows="3"
                                    placeholder="Mensaje"></textarea>
                            </div>
                            <div class="w-100 text-center mt-3 d-flex justify-content-center justify-content-md-start">
                                <button type="button" class="btn-celeste contact">Enviar</button>
                            </div>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </main>
    <!-- Footer -->


    <footer>
        <div class="footer">
        </div>
    </footer>

    <script src="/assets/js/footer.js"></script><!--js de footer-->
    <script src="./assets/js/header.js"></script>


    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
        integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
        integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
        integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
        crossorigin="anonymous"></script>
    <!-- <script src="./assets/js/main.js"></script> -->
    <script type="module" src="./assets/js/contacto.js"></script>
    <script src="https://smtpjs.com/v3/smtp.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
</body>

</html>
