    <title>Inicio de Sesión - Vianda Market</title>

<body>
<header>
    <div class="headerQuick">
    </div>
</header>


<section class="fondoform py-5">
    <div class="container d-flex align-items-center justify-content-center">
        <div class="contenedorform">
            <h2 class="text-center fw-bold mt-2" id="Titulo1">Iniciar Sesión</h2>
            <h5 class="text-center mb-4 text-muted" id="Titulo2">Ingresa tus datos</h5>

            <form class="w-100">
                <div class="mb-4">
                    <input type="email" class="form-control" id="correoFormulario" placeholder="Correo electrónico">
                </div>

                <div class="mb-3 wrapperPass">
                    <input type="password" class="form-control" id="contraFormulario" placeholder="Contraseña">
                    <i id="eyeicon" class="bi bi-eye-slash-fill fs-5"></i>
                </div>  

                <div class="text-end mb-4">
                    <p class="p1 mb-0"><strong class="text-dark">¿Olvidaste tu contraseña?</strong></p>
                </div>

                <div class="alert alert-danger fade show" style="display:none;" role="alert" id="alertValidaciones">
                    <p id="alertValidacionesTexto" class="mb-0"></p>
                </div>

                <div class="d-grid mb-4 mt-2">
                    <button id="btnAgregar" class="btn" type="button">
                        Entrar
                    </button>
                </div>

                <div class="text-center">
                    <p class="p2 mb-0">¿No tienes una cuenta? <br>
                        Regístrate <a href="./registrousuario.html" class="text-decoration-none text-danger fw-bold h6">aquí</a>
                    </p>
                </div>
            </form>
        </div>
    </div>
</section>
<div class="position-fixed bottom-0 end-0 p-3 form-dash" id="divAlert" style="z-index: 11">
</div>
<div class="alert alert-danger fade show" style="display:none;" role="alert" id="alertValidaciones">
    <p id="alertValidacionesTexto"></p>

</div>

    </div>
    </div>
