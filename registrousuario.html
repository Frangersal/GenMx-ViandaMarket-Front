<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Descubre en Vianda Market la mejor selección de cortes de carne y productos de alta calidad para tu hogar o negocio.">
    <link rel="icon" type="image/x-icon" href="./assets/img/favicon.ico"/>
    <link rel="stylesheet" href="./assets/css/registrousuario.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.4/font/bootstrap-icons.css" crossorigin="anonymous">
    <link
            href="https://fonts.cdnfonts.com/css/josefin-sans?styles=19769,19766,19772,19773,19767,19768,19770,19771,19764,19765"
            rel="stylesheet">

    <title>Registro - Vianda Market</title>
    <script type="module" src="./assets/js/registrousuario.js"></script>
    <script type="module" src="./assets/js/peticionesRegistroUsuario.js"></script>
</head>

<body>
<header>
    <div class="headerQuick">
    </div>
</header>

<section class="fondoform py-5">
    <div class="container d-flex align-items-center justify-content-center">
        <div class="contenedorform">
            <h2 class="text-center fw-bold mt-2" id="Titulo1">REGÍSTRATE</h2>
            <h5 class="text-center mb-4 text-muted" id="Titulo2">Ingresa tus datos</h5>
            
            <form class="w-100">
                <div class="row mb-3">
                    <div class="col-md-6 mb-3 mb-md-0">
                        <input type="text" class="form-control register" placeholder="Nombre(s)">
                    </div>
                    <div class="col-md-6">
                        <input type="text" class="form-control register" placeholder="Apellidos">
                    </div>
                </div>

                <div class="mb-3">
                    <input type="email" class="form-control register" placeholder="Correo electrónico">
                </div>

                <div class="mb-3 wrapperPass">
                    <input type="password" class="form-control register" placeholder="Contraseña" id="campoPass1">
                    <i id="eyeicon1" class="bi bi-eye-slash-fill fs-5"></i>
                </div> 

                <div class="mb-3 wrapperPass">
                    <input type="password" class="form-control register" placeholder="Confirmar contraseña" id="campoPass2">
                    <i id="eyeicon2" class="bi bi-eye-slash-fill fs-5"></i>
                </div>   
                
                <p class="contraseña text-muted mb-4">Tu contraseña debe contener al menos un dígito, una mayúscula, una minúscula y un caracter especial.</p>
                
                <!-- Alerts (Moved entirely outside of inputs structure) -->
                <div class="alert alert-danger fade show mb-4" style="display:none;" role="alert" id="alertValidaciones">
                    <p id="alertValidacionesTexto" class="mb-0"></p>
                </div>
                
                <div class="d-grid mb-3">
                    <button id="btnAgregar" class="btn btn-lg fw-bold form-dash register text-white" type="button">Registrarse</button>
                    <!-- Botón Limpiar condicionado a estilos compartidos si es necesario mostrarse después mediante JS -->
                    <button id="btnClear" class="btn btn-lg fw-bold form-dash register text-white mt-2" type="button">Limpiar</button>
                </div>  
                
                <div class="text-center mt-4">
                    <p class="p2 mb-0">¿Tienes una cuenta? <br> Inicia sesión 
                        <a href="./iniciosesion.html" class="text-decoration-none text-danger fw-bold h6">aquí</a>
                    </p>
                </div>  
            </form>
        </div>
    </div>
</section>
<!--Toast-->
<div>
    <div class="position-fixed bottom-0 end-0 p-3 register"
         style="z-index: 11">
    </div>
</div>
<!--End Toast-->
<footer>
    <div class="footer">
    </div>
</footer>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
        integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
        crossorigin="anonymous"></script>
<script src="./assets/js/footer.js"></script>
<script src="./assets/js/header.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
        integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
        integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"
        crossorigin="anonymous"></script>
</body>

</html>
